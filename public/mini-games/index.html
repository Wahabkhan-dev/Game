<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowGamma — Learning Games</title>
<link rel="stylesheet" href="shared/shared.css">
</head>
<body>
<!-- =========================================================
     SHADOWGAMMA HUB — links all 20 games.
     Games 1-10 open the batch-1 single file (../shadowgamma.html).
     Games 11-20 open their own folder's index.html.
     Add a new game by adding one <a class="hub-card"> below.
     ========================================================= -->
<div id="app">
  <div class="hub-head">
    <h1>ShadowGamma</h1>
    <p>Pick a game to play! 🎈</p>
  </div>
  <div class="hub-grid" id="grid"></div>
</div>

<script src="shared/shared.js"></script>
