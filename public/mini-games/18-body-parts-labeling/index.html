<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Parts Labeling — ShadowGamma</title>
<link rel="stylesheet" href="../shared/shared.css">
<style>
/* Game-18-only: character stage + tap zones */
.char-stage{position:relative;width:280px;height:520px;margin:0 auto;
  background:#f7f8ff;border:4px solid #dfe3ff;border-radius:24px;overflow:hidden;}
.char-stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
.char-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:260px;}
.zone{position:absolute;transform:translate(-50%,-50%);border-radius:50%;
  border:3px dashed rgba(91,108,255,.35);cursor:pointer;transition:background .15s;}
.zone:hover{background:rgba(91,108,255,.12);}
.zone.hit{background:rgba(47,191,113,.35);border-color:var(--good);}
</style>
</head>
<body>
<div id="app"></div>
<script src="../shared/shared.js"></script>
<script src="game.js"></script>
</body>
</html>
